<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿總量血壓</title>
    <meta name="description" content="寶總血壓紀錄">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CA0CB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="阿總量血壓">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-180.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Huninn&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg: #F2FAFF;--paper: #FFFFFF;--ink: #3A5568;--ink-soft: #93AEC0;--line: #DDEFF8;
            --accent: #7EC8E3;--accent-deep: #4CA0CB;--accent-soft: #E9F6FC;
            --sky: #CDEBF9;--sky-soft: #EFF9FD;--mint: #7FC7A0;--mint-bg: #E6F6EE;
            --honey: #D6A23C;--honey-bg: #FBF0DA;--peach: #E08A52;--peach-bg: #FCEADD;
            --rose: #D9628A;--rose-bg: #FBE2EC;--crimson: #C1476B;--crimson-bg: #F8D9E2;
        }
        *{box-sizing:border-box;}
        body{margin:0;background:var(--bg);color:var(--ink);font-family:'Huninn',sans-serif;min-height:100vh;padding:32px 16px 100px;position:relative;overflow-x:hidden;}
        .wrap{max-width:600px;margin:0 auto;position:relative;z-index:1;}
        header{margin-bottom:26px;text-align:center;}
        .eyebrow{font-size:13px;letter-spacing:0.08em;color:var(--accent-deep);margin:0 0 4px;font-weight:700;}
        h1{font-family:'Baloo 2',sans-serif;font-size:30px;margin:0 0 4px;font-weight:700;color:var(--ink);}
        .spark{display:inline-block;animation:bounce 1.6s ease-in-out infinite;}
        @keyframes bounce{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-4px) rotate(-8deg);}}
        .legend-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:20px;}
        .legend-title{font-size:13px;font-weight:700;color:var(--accent-deep);margin-bottom:10px;}
        .legend-rows{display:flex;flex-direction:column;gap:7px;}
        .legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);}
        .legend-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
        .legend-row .range{margin-left:auto;color:var(--ink-soft);font-family:'Baloo 2',sans-serif;font-weight:600;}
        .monitor{background:linear-gradient(150deg,#FFFFFF 0%,#EAF7FD 55%,#D9EEFA 100%);border-radius:26px;padding:24px 24px 20px;color:var(--ink);position:relative;overflow:hidden;margin-bottom:20px;border:1px solid var(--line);box-shadow:0 14px 30px -18px rgba(90,150,180,0.35);}
        .btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;border:none;padding:14px 16px;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;}
    </style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">MY VITALS DIARY</p>
    <h1><span class="spark">⭐</span> 寶總血壓紀錄 <span class="spark" style="animation-delay:.4s;">✨</span></h1>
  </header>

  <div class="legend-card">
    <div class="legend-title">📏 成人血壓標準對照</div>
    <div class="legend-rows">
      <div class="legend-row"><span class="dot" style="background:var(--mint);"></span>正常<span class="range">&lt;120 / &lt;80</span></div>
      <div class="legend-row"><span class="dot" style="background:var(--honey);"></span>血壓偏高<span class="range">120–129 / &lt;80</span></div>
      <div class="legend-row"><span class="dot" style="background:var(--peach);"></span>高血壓第一期<span class="range">130–139 / 80–89</span></div>
      <div class="legend-row"><span class="dot" style="background:var(--rose);"></span>高血壓第二期<span class="range">≥140 / ≥90</span></div>
      <div class="legend-row"><span class="dot" style="background:var(--crimson);"></span>高血壓危象<span class="range">&gt;180 / &gt;120</span></div>
    </div>
  </div>

  <p style="text-align:center;padding:40px;color:#666;">App 已載入成功！如果看到這行文字，表示基礎已經正常。</p>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
