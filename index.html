<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶總血壓紀錄</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #f0f7fa;
            --card-bg: #ffffff;
            --primary-color: #51a3c8;
            --text-color: #4a5568;
            --border-radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #2c5282;
            margin: 5px 0;
        }

        .header .subtitle {
            font-size: 0.8rem;
            color: #a0aec0;
            letter-spacing: 2px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .auth-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #cbd5e0;
            border-radius: 50%;
        }

        .dot.active {
            background-color: #48bb78;
        }

        button.btn-auth {
            border: 1px solid #e2e8f0;
            background: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        .form-field {
            flex: 1;
        }

        .form-field label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 4px;
            color: #718096;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:disabled {
            background-color: #cbd5e0;
            cursor: not-allowed;
        }

        /* 歷史紀錄表格樣式 */
        .history-list {
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }

        th {
            color: #718096;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="subtitle">MY VITALS DIARY</div>
        <h1>⭐ 寶總血壓紀錄 ✨</h1>
    </div>

    <!-- 授權狀態卡片 -->
    <div class="card auth-status">
        <div class="status-badge">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">正在檢查連線狀態...</span>
        </div>
        <button class="btn-auth" id="authBtn" onclick="handleAuth()">G 授權</button>
    </div>

    <!-- 輸入表單卡片 -->
    <div class="card">
        <h3>📊 新增紀錄至雲端</h3>
        <div class="form-group">
            <div class="form-row">
                <div class="form-field">
                    <label>日期</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="form-field">
                    <label>時間</label>
                    <input type="time" id="inputTime">
                </div>
            </div>
            <div class="form-row">
                <div class="form-field">
                    <label>收縮壓</label>
                    <input type="number" id="sys" placeholder="120">
                </div>
                <div class="form-field">
                    <label>舒張壓</label>
                    <input type="number" id="dia" placeholder="80">
                </div>
                <div class="form-field">
                    <label>心跳</label>
                    <input type="number" id="pulse" placeholder="75">
                </div>
            </div>
            <button class="btn-submit" id="saveBtn" onclick="saveData()" disabled>🫧 寫入個人雲端試算表</button>
        </div>
    </div>

    <!-- 歷史紀錄列表卡片 -->
    <div class="card">
        <h3>📋 歷史紀錄</h3>
        <div class="history-list">
            <table>
                <thead>
                    <tr>
                        <th>日期時間</th>
                        <th>收縮壓</th>
                        <th>舒張壓</th>
                        <th>心跳</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr><td colspan="4">尚無紀錄或尚未載入</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CLIENT_ID = '325830752343-jviq0jtm579bdsgbplkutkmauq654iai.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    
    let tokenClient;
    let accessToken = null;
    let spreadsheetId = null;

    // 初始化預設時間與 GIS
    window.onload = () => {
        const now = new Date();
        document.getElementById('inputDate').value = now.toISOString().split('T')[0];
        document.getElementById('inputTime').value = now.toTimeString().slice(0, 5);

        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (response) => {
                if (response.error !== undefined) {
                    throw (response);
                }
                accessToken = response.access_token;
                document.getElementById('statusDot').classList.add('active');
                document.getElementById('statusText').innerText = '已連線至個人的雲端硬碟！';
                document.getElementById('authBtn').innerText = '已授權';
                document.getElementById('saveBtn').disabled = false;

                // 授權成功後，自動找尋或建立檔案並拉取歷史紀錄
                await initDriveAndSheet();
            },
        });
    };

    function handleAuth() {
        tokenClient.requestAccessToken({prompt: ''});
    }

    // 初始化 Drive 資料夾與 Sheet 試算表
    async function initDriveAndSheet() {
        try {
            // 1. 搜尋是否有「血壓紀錄表」
            let query = "name = '血壓紀錄表' and mimeType = 'application/vnd.google-apps.spreadsheet' and trashed = false";
            let res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}`, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            let data = await res.json();

            if (data.files && data.files.length > 0) {
                spreadsheetId = data.files[0].id;
            } else {
                // 2. 若無則新建一個 Sheet 並預設表頭
                let createRes = await fetch('https://sheets.googleapis.com/v4/spreadsheets', {
                    method: 'POST',
                    headers: {
                        Authorization: `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        properties: { title: '血壓紀錄表' },
                        sheets: [{
                            properties: { title: 'Sheet1' },
                            data: [{
                                startRow: 0,
                                startColumn: 0,
                                rowData: [{
                                    values: [
                                        { userEnteredValue: { stringValue: '日期' } },
                                        { userEnteredValue: { stringValue: '時間' } },
                                        { userEnteredValue: { stringValue: '收縮壓' } },
                                        { userEnteredValue: { stringValue: '舒張壓' } },
                                        { userEnteredValue: { stringValue: '心跳' } }
                                    ]
                                }]
                            }]
                        }]
                    })
                });
                let newSheet = await createRes.json();
                spreadsheetId = newSheet.spreadsheetId;
            }

            // 讀取當前 Sheet 資料
            await loadHistoryData();
        } catch (err) {
            console.error("初始化試算表失敗:", err);
            alert("試算表初始化失敗，請檢查 Console");
        }
    }

    // 寫入資料至 Sheet
    async function saveData() {
        const date = document.getElementById('inputDate').value;
        const time = document.getElementById('inputTime').value;
        const sys = document.getElementById('sys').value;
        const dia = document.getElementById('dia').value;
        const pulse = document.getElementById('pulse').value;

        if (!sys || !dia || !pulse) {
            alert('請填寫完整的數值！');
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = '寫入中...';
        saveBtn.disabled = true;

        try {
            const appendUrl = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1!A:E:append?valueInputOption=USER_ENTERED`;
            const res = await fetch(appendUrl, {
                method: 'POST',
                headers: {
                    Authorization: `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    values: [[date, time, sys, dia, pulse]]
                })
            });

            if (res.ok) {
                alert('寫入成功！');
                // 清空輸入欄
                document.getElementById('sys').value = '';
                document.getElementById('dia').value = '';
                document.getElementById('pulse').value = '';
                // 重新載入列表
                await loadHistoryData();
            } else {
                const errData = await res.json();
                console.error('寫入失敗:', errData);
                alert('寫入失敗！請查看 Console');
            }
        } catch (err) {
            console.error('寫入異常:', err);
            alert('網路或寫入發生錯誤！');
        } finally {
            saveBtn.innerText = '🫧 寫入個人雲端試算表';
            saveBtn.disabled = false;
        }
    }

    // 從 Sheet 讀取資料並印出在畫面上
    async function loadHistoryData() {
        if (!spreadsheetId) return;

        try {
            const readUrl = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1!A2:E100`;
            const res = await fetch(readUrl, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await res.json();

            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';

            if (data.values && data.values.length > 0) {
                // 將最新紀錄排在最上面
                const reversedData = data.values.reverse();
                reversedData.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row[0] || ''} ${row[1] || ''}</td>
                        <td>${row[2] || '-'}</td>
                        <td>${row[3] || '-'}</td>
                        <td>${row[4] || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4">目前雲端表格尚無任何紀錄</td></tr>';
            }
        } catch (err) {
            console.error("讀取歷史紀錄失敗:", err);
        }
    }
</script>

</body>
</html>
